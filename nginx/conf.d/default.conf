upstream django_server {
    server web:8000;
}

server {
    listen 80;
    server_name api.catechcare.com;
    
    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.catechcare.com;

    # SSL parameters (cert paths)
    # ssl_certificate /etc/letsencrypt/live/api.catechcare.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.catechcare.com/privkey.pem;

    # Security Headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate Limiting Zone setup in nginx.conf or here if http context is tricky
    # For a full setup, define limit_req_zone in nginx.conf (http context)
    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    location / {
        # limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://django_server;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # WebSocket support for Django Channels
    location /ws/ {
        proxy_pass http://django_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }
}
